name: Update IPTV Playlist

on:
  schedule:
    - cron: '0 */3 * *' # Every 3 hours at :00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-playlist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run playlist generator
        run: python generate_playlist.py

      - name: Commit changes if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add playlist.m3u playlist_backup.m3u README.md
          git diff --staged --quiet || git commit -m "chore: update playlist $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
