name: Update IPTV Playlist
on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests
      - run: python generate_playlist.py
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add playlist.m3u playlist_backup.m3u README.md
          git diff --staged --quiet || git commit -m "chore: update playlist $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
