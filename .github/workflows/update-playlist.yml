name: Update IPTV Playlist

on:
  schedule:
    - cron: "0 */3 * *" # Every 3 hours
  workflow_dispatch: # Manual run button

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run playlist generator
        run: python generate_playlist.py # rename your py file to this

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Only commit if files changed
          git add playlist.m3u playlist_backup.m3u README.md
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update playlist [$(date -u +'%Y-%m-%d %H:%M UTC')]"
            git push
          fi
