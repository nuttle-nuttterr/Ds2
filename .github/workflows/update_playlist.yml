name: Update Tamil & English IPTV Playlist

on:
  schedule:
    # Runs every 6 hours automatically
    - cron: '0 */6 * * *'
  push:
    branches: [ main ]
  workflow_dispatch: # Allows you to run it manually from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: pip install requests

      - name: Run playlist generator
        run: python generate_playlist.py

      - name: Commit and Push changes
        run: |
          # Setup Git bot
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Stage the updated files
          git add playlist.m3u playlist_backup.m3u README.md
          
          # Check if there are actual changes to commit
          if ! git diff --staged --quiet; then
            git commit -m "Auto-update: Refreshed live channels and removed dead links"
            git push
            echo "✅ Changes pushed successfully."
          else
            echo "ℹ️ No changes detected. All links are up to date."
          fi
